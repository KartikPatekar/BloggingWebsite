01,"1927":620,"1928":623,"1929":617,"1930":622,"1931":619,"1932":735,"1933":808,"1934":858,"1935":836,"1936":848,"1937":928,"1938":952,"1939":931,"1940":1017,"1941":918,"1942":925,"1943":957,"1944":946,"1945":864,"1946":866,"1947":899,"1948":944,"1949":1001,"1950":1054,"1951":1097,"1952":1140,"1953":1184,"1954":1231,"1955":1173,"1956":1280,"1957":1302,"1958":1237,"1959":1458,"1960":1530,"1961":1495,"1962":1443,"1963":1438,"1964":1588,"1965":1828,"1966":1683,"1967":1765,"1968":1741,"1969":1683,"1970":1710,"1971":1661,"1972":1761,"1973":1693,"1974":1776,"1975":1659,"1976":1707,"1977":1578,"1978":1541,"1979":1451,"1980":1452,"1981":1492,"1982":1398,"1983":1320,"1984":1269,"1985":1250,"1986":1215,"1987":1203,"1988":1239,"1989":1215,"1990":1285,"1991":1280,"1992":1309,"1993":1312,"1994":1142,"1995":1181,"1996":1261,"1997":1311,"1998":1309,"1999":1374,"2000":1429,"2001":1504,"2002":1579,"2003":1699,"2004":1828,"2005":1970,"2006":2134,"2007":2319,"2008":2505,"2009":2743,"2010":3032,"2011":3205,"2012":3345,"2013":3409,"2014":3461,"2015":3454,"2016":3477,"2017":3490,"2018":3522,"2019":3466,"2020":3271,"2021":3322,"2022":3342},"ZWE":{"1914":921,"1915":880,"1916":841,"1917":803,"1918":767,"1919":733,"1920":644,"1921":639,"1922":698,"1923":749,"1924":711,"1925":706,"1926":768,"1927":840,"1928":873,"1929":845,"1930":822,"1931":852,"1932":819,"1933":829,"1934":854,"1935":872,"1936":910,"1937":924,"1938":947,"1939":966,"1940":943,"1941":920,"1942":898,"1943":877,"1944":856,"1945":854,"1946":878,"1947":943,"1948":1036,"1949":1055,"1950":1117,"1951":1151,"1952":1154,"1953":1211,"1954":1231,"1955":1288,"1956":1422,"1957":1473,"1958":1444,"1959":1474,"1960":1495,"1961":1524,"1962":1497,"1963":1436,"1964":1519,"1965":1568,"1966":1541,"1967":1618,"1968":1592,"1969":1731,"1970":2043,"1971":2157,"1972":2268,"1973":2283,"1974":2275,"1975":2235,"1976":2163,"1977":1946,"1978":1964,"1979":1930,"1980":2064,"1981":2243,"1982":2240,"1983":2190,"1984":2067,"1985":2128,"1986":2107,"1987":2004,"198 const YEAR_MIN=1500, YEAR_MAX=2022;

function getGdp(code, year) {
    const d = GDP[code];
    if (!d) return null;
    if (d[year] !== undefined) return d[year];
    // Find nearest prior year with data
    for (let y = year - 1; y >= year - 5; y--) {
        if (d[y] !== undefined) return d[y];
    }
    return null;
}

function gdpColor(val) {
    if (val === null) return "#ddd";
    // Log scale coloring
    const log = Math.log10(Math.max(val, 1));
    // Range: ~2.5 (300) to ~5.2 (160000), normalize to 0-1
    const t = Math.min(Math.max((log - 2.5) / 2.7, 0), 1);

    // Color stops: dark brown -> brown -> gold -> yellow -> light green -> green -> dark green
    const stops = [
        [0.0, 44, 24, 16],
        [0.15, 139, 69, 19],
        [0.3, 212, 160, 23],
        [0.45, 244, 208, 63],
        [0.6, 144, 238, 144],
        [0.8, 39, 174, 96],
        [1.0, 0, 100, 0]
    ];

    let i = 0;
    for (; i < stops.length - 1; i++) {
        if (t <= stops[i + 1][0]) break;
    }
    const s0 = stops[i], s1 = stops[i + 1];
    const f = (t - s0[0]) / (s1[0] - s0[0]);
    const r = Math.round(s0[1] + f * (s1[1] - s0[1]));
    const g = Math.round(s0[2] + f * (s1[2] - s0[2]));
    const b = Math.round(s0[3] + f * (s1[3] - s0[3]));
    return "rgb(" + r + "," + g + "," + b + ")";
}

function formatGdp(val) {
    if (val === null) return "No data";
    if (val >= 1000) return "$" + (val / 1000).toFixed(1) + "k";
    return "$" + val;
}

// Map setup
const map = L.map("map", {
    center: [20, 0], zoom: 2, minZoom: 2, maxZoom: 6,
    worldCopyJump: true, zoomSnap: 0.5
});
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd", maxZoom: 19
}).addTo(map);

// Tooltip
const info = L.control({ position: "topright" });
info.onAdd = function() {
    this._div = L.DomUtil.create("div", "info-tooltip");
    this._div.style.display = "none";
    return this._div;
};
info.update = function(props, year) {
    if (!props) { this._div.style.display = "none"; return; }
    const code = props.ISO3;
    const val = getGdp(code, year);
    let html = "<b>" + props.COUNTRY + "</b><br>GDP/capita: " + formatGdp(val);
    this._div.innerHTML = html;
    this._div.style.display = "block";
};
info.addTo(map);

let currentYear = YEAR_MIN;
const geoLayer = L.geoJSON(GJ, {
    style: feat => styleFeature(feat, currentYear),
    onEachFeature: (feat, layer) => {
        layer.on({
            mouseover: e => {
                e.target.setStyle({ weight: 2, fillOpacity: 0.9 });
                info.update(feat.properties, currentYear);
            },
            mouseout: e => {
                geoLayer.resetStyle(e.target);
                info.update(null);
            }
        });
    }
}).addTo(map);

function styleFeature(feat, year) {
    const code = feat.properties.ISO3 || feat.id;
    const val = getGdp(code, year);
    return {
        fillColor: gdpColor(val),
        weight: 0.5,
        color: "#555",
        fillOpacity: 0.8
    };
}

function updateMap(year) {
    currentYear = year;
    geoLayer.eachLayer(layer => {
        const code = layer.feature.properties.ISO3 || layer.feature.id;
        const val = getGdp(code, year);
        layer.setStyle({
            fillColor: gdpColor(val),
            weight: 0.5,
            color: "#555",
            fillOpacity: 0.8
        });
    });
    document.getElementById("year-display").textContent = "Year: " + year;
}

// Slider
const slider = document.getElementById("year-slider");
slider.addEventListener("input", () => updateMap(parseInt(slider.value)));

// Play/Pause
let playing = false, timer = null;
function togglePlay() {
    playing = !playing;
    const btn = document.getElementById("play-btn");
    if (playing) {
        btn.innerHTML = "&#9208; Pause";
        btn.classList.add("playing");
        tick();
    } else {
        btn.innerHTML = "&#9654; Play";
        btn.classList.remove("playing");
        clearTimeout(timer);
    }
}
function tick() {
    if (!playing) return;
    let y = parseInt(slider.value) + 1;
    if (y > YEAR_MAX) y = YEAR_MIN;
    slider.value = y;
    updateMap(y);
    timer = setTimeout(tick, parseInt(document.getElementById("speed-select").value));
}

updateMap(YEAR_MIN);
</script>
