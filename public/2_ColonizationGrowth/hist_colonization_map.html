const YEAR_MIN=1462, YEAR_MAX=2022;

const COLORS = {
    colonized: "#E74C3C",
    notYet: "#BDC3C7",
    independent: "#27AE60",
    never: "#F4D03F"
};

// Precompute: for each colonized country, store min start and max end
const countryMeta = {};
for (const [code, spans] of Object.entries(CD)) {
    countryMeta[code] = {
        firstColonized: spans[0][0],
        lastIndependence: spans[spans.length - 1][1]
    };
}

function getStatus(code, year) {
    const spans = CD[code];
    if (!spans) return { status: "never", colonizer: null };
    const meta = countryMeta[code];
    if (year < meta.firstColonized) return { status: "notYet", colonizer: null };
    for (const s of spans) {
        if (year >= s[0] && year <= s[1]) return { status: "colonized", colonizer: s[2] };
    }
    if (year > meta.lastIndependence) return { status: "independent", colonizer: null };
    return { status: "never", colonizer: null };
}

// Map setup
const map = L.map("map", {
    center: [20, 0], zoom: 2, minZoom: 2, maxZoom: 6,
    worldCopyJump: true, zoomSnap: 0.5
});
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd", maxZoom: 19
}).addTo(map);

// Tooltip
const info = L.control({ position: "topright" });
info.onAdd = function() {
    this._div = L.DomUtil.create("div", "info-tooltip");
    this._div.style.display = "none";
    return this._div;
};
info.update = function(props, year) {
    if (!props) { this._div.style.display = "none"; return; }
    const code = props.ISO3;
    const st = getStatus(code, year);
    const labels = { colonized: "Colonized", notYet: "Not Yet Colonized", independent: "Independent", never: "Never Colonized" };
    let html = "<b>" + props.COUNTRY + "</b><br>Status: " + labels[st.status];
    if (st.colonizer) html += "<br>Colonizer: " + st.colonizer;
    const meta = countryMeta[code];
    if (meta) {
        html += "<br>Colonized: " + meta.firstColonized;
        html += "<br>Independent: " + meta.lastIndependence;
    }
    this._div.innerHTML = html;
    this._div.style.display = "block";
};
info.addTo(map);

let currentYear = YEAR_MIN;
const geoLayer = L.geoJSON(GJ, {
    style: feat => styleFeature(feat, currentYear),
    onEachFeature: (feat, layer) => {
        layer.on({
            mouseover: e => {
                e.target.setStyle({ weight: 2, fillOpacity: 0.85 });
                info.update(feat.properties, currentYear);
            },
            mouseout: e => {
                geoLayer.resetStyle(e.target);
                info.update(null);
            }
        });
    }
}).addTo(map);

function styleFeature(feat, year) {
    const code = feat.properties.ISO3 || feat.id;
    const st = getStatus(code, year);
    return {
        fillColor: COLORS[st.status],
        weight: 0.5,
        color: "#555",
        fillOpacity: 0.75
    };
}

function updateMap(year) {
    currentYear = year;
    geoLayer.eachLayer(layer => {
        const code = layer.feature.properties.ISO3 || layer.feature.id;
        const st = getStatus(code, year);
        layer.setStyle({
            fillColor: COLORS[st.status],
            weight: 0.5,
            color: "#555",
            fillOpacity: 0.75
        });
    });
    document.getElementById("year-display").textContent = "Year: " + year;
}

// Slider
const slider = document.getElementById("year-slider");
slider.addEventListener("input", () => updateMap(parseInt(slider.value)));

// Play/Pause
let playing = false, timer = null;
function togglePlay() {
    playing = !playing;
    const btn = document.getElementById("play-btn");
    if (playing) {
        btn.innerHTML = "&#9208; Pause";
        btn.classList.add("playing");
        tick();
    } else {
        btn.innerHTML = "&#9654; Play";
        btn.classList.remove("playing");
        clearTimeout(timer);
    }
}
function tick() {
    if (!playing) return;
    let y = parseInt(slider.value) + 1;
    if (y > YEAR_MAX) y = YEAR_MIN;
    slider.value = y;
    updateMap(y);
    timer = setTimeout(tick, parseInt(document.getElementById("speed-select").value));
}

updateMap(YEAR_MIN);
</script>
