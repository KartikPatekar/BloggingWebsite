<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Indian Railway Track Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { display: flex; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; background: #f3f4f6; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 290px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: #fff; border-right: 1px solid #e5e7eb;
  overflow: hidden;
}
#sb-header {
  padding: 11px 16px; border-bottom: 1px solid #e5e7eb; background: #f9fafb; flex-shrink: 0;
}
#sb-header h1 { font-size: 0.88rem; font-weight: 700; color: #b91c1c; }
#sb-header .sub { font-size: 0.71rem; color: #6b7280; margin-top: 2px; }

#search-wrap { padding: 7px 12px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
#search {
  width: 100%; padding: 5px 9px;
  border: 1px solid #d1d5db; border-radius: 4px;
  font-size: 0.77rem; outline: none; color: #111827;
}
#search:focus { border-color: #b91c1c; box-shadow: 0 0 0 2px #fee2e2; }

#track-list { flex: 1; overflow-y: auto; padding: 3px 0; }

.group-hdr {
  padding: 6px 14px 2px; font-size: 0.64rem; font-weight: 700;
  color: #9ca3af; text-transform: uppercase; letter-spacing: 0.6px;
  border-top: 1px solid #f3f4f6; margin-top: 4px;
}
.group-hdr:first-child { border-top: none; margin-top: 0; }

.track-item {
  padding: 6px 12px; cursor: pointer;
  display: flex; align-items: flex-start; gap: 8px;
  border-left: 3px solid transparent;
  transition: background 0.08s;
}
.track-item:hover { background: #f9fafb; }
.track-item.active { background: #fef2f2; border-left-color: #b91c1c; }

.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.t-name { font-size: 0.8rem; font-weight: 600; color: #111827; }
.t-meta { font-size: 0.68rem; color: #6b7280; margin-top: 1px; }

/* ── Info panel ── */
#info-panel {
  border-top: 1px solid #e5e7eb; padding: 11px 14px;
  font-size: 0.77rem; background: #f9fafb; flex-shrink: 0;
}
.ip-empty { color: #9ca3af; font-style: italic; }
.ip-title { font-weight: 700; font-size: 0.86rem; color: #b91c1c; margin-bottom: 7px; }
.ip-row {
  display: flex; justify-content: space-between;
  padding: 3px 0; border-bottom: 1px solid #f0f0f0;
  gap: 8px;
}
.ip-row:last-child { border-bottom: none; }
.ip-key { color: #6b7280; white-space: nowrap; }
.ip-val { font-weight: 600; color: #111827; text-align: right; }

/* ── Legend ── */
#legend {
  border-top: 1px solid #e5e7eb; padding: 9px 14px;
  font-size: 0.72rem; color: #374151; flex-shrink: 0;
  display: none;
}
.leg-title { font-weight: 600; font-size: 0.74rem; margin-bottom: 5px; }
.leg-row { display: flex; align-items: center; gap: 7px; margin: 2px 0; }
.swatch { width: 22px; height: 4px; border-radius: 2px; flex-shrink: 0; }

/* ── Map ── */
#map { flex: 1; }
</style>
</head>
<body>

<div id="sidebar">

    <h1>Indian Railway Tracks</h1>

    <input id="search" type="text" placeholder="Filter by name or railway…" autocomplete="off"/>

  <div id="track-list"></div>
  <div id="info-panel">
    <div class="ip-empty" id="ip-empty">Click a track to see details.</div>
    <div id="ip-content" style="display:none"></div>
  </div>
  <div id="legend">

    <div class="leg-row"><span class="swatch" style="background:#b91c1c"></span>1870–1889</div>
    <div class="leg-row"><span class="swatch" style="background:#ea580c"></span>1890–1904</div>
    <div class="leg-row"><span class="swatch" style="background:#ca8a04"></span>1905–1919</div>

    <div class="leg-row"><span class="swatch" style="background:#94a3b8"></span>unknown</div>
  </div>
</div>

// ── Year → colour ────────────────────────────────────────────────────────────
function yearColor(y) {
  const yr = parseInt(y);
  if (!yr || yr === 9999) return '#94a3b8';
  if (yr < 1870) return '#7f1d1d';
  if (yr < 1890) return '#b91c1c';
  if (yr < 1905) return '#ea580c';
  if (yr < 1920) return '#ca8a04';
  return '#15803d';
}

// Sidebar dot palette (cycles)
const PALETTE = [
  '#b91c1c','#1d4ed8','#15803d','#7c3aed','#b45309',
  '#0e7490','#be185d','#4d7c0f','#c2410c','#1e40af',
  '#6d28d9','#065f46','#9d174d','#92400e','#1e3a8a',
];
const dotColor = tid => PALETTE[(tid - 1) % PALETTE.length];

// ── Map init ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([22, 80], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 15,
}).addTo(map);

// ── GeoJSON layers ───────────────────────────────────────────────────────────
let bgLayer = null;
let fgLayer = null;
let activeId = null;

function initBg() {
  bgLayer = L.geoJSON(GEOJSON, {
    style: () => ({ color: '#cbd5e1', weight: 1.2, opacity: 0.8 }),
    onEachFeature(feat, layer) {
      layer.on('click', () => selectTrack(feat.properties.track_id));
    }
  }).addTo(map);
}

function updateBgOpacity(selectedId) {
  bgLayer.setStyle(feat => {
    if (feat.properties.track_id === selectedId)
      return { color: '#cbd5e1', weight: 0, opacity: 0 };   // hidden — fg takes over
    return { color: '#e2e8f0', weight: 1, opacity: 0.4 };   // dimmed
  });
}

function buildFg(trackId) {
  if (fgLayer) { map.removeLayer(fgLayer); fgLayer = null; }
  const features = GEOJSON.features.filter(f => f.properties.track_id === trackId);
  if (!features.length) return;

  fgLayer = L.geoJSON({ type: 'FeatureCollection', features }, {
    style(feat) {
      return { color: yearColor(feat.properties.year), weight: 4, opacity: 1 };
    },
    onEachFeature(feat, layer) {
      const p   = feat.properties;
      const yr  = p.year_lbl || (p.year === 9999 ? 'unknown' : p.year);
      const mi  = p.miles != null ? (+p.miles).toFixed(1) : '?';
      layer.bindPopup(
        `<b>${p.section}</b><br>` +
        `Railway: ${p.railway || '–'}<br>` +
        `Year opened: ${yr}<br>` +
        `Length: ${mi} mi<br>` +
        `Gauge: ${p.gauge || '–'}`,
        { maxWidth: 260 }
      );
      layer.on('mouseover', function() { this.setStyle({ weight: 6 }); });
      layer.on('mouseout',  function() { this.setStyle({ weight: 4 }); });
    }
  }).addTo(map);

  map.fitBounds(fgLayer.getBounds(), { padding: [40, 40] });
}

// ── Selection ────────────────────────────────────────────────────────────────
function selectTrack(trackId) {
  if (activeId === trackId) return;
  activeId = trackId;

  updateBgOpacity(trackId);
  buildFg(trackId);
  showInfo(trackId);
  renderList(document.getElementById('search').value);
  document.getElementById('legend').style.display = 'block';
}

function showInfo(trackId) {
  const t = TRACKS.find(t => t.track_id === trackId);
  if (!t) return;
  document.getElementById('ip-empty').style.display = 'none';
  const c = document.getElementById('ip-content');
  c.style.display = 'block';
  // Truncate railway list if long
  const rwyList = t.railways.split(' | ').map(s => s.trim());
  const rwyStr  = rwyList.length > 1
    ? rwyList[0] + ` (+${rwyList.length - 1} more)`
    : rwyList[0];
  c.innerHTML =
    `<div class="ip-title">${t.track_name}</div>` +
    `<div class="ip-row"><span class="ip-key">Total length</span><span class="ip-val">${t.total_miles.toFixed(1)} mi</span></div>` +
    `<div class="ip-row"><span class="ip-key">Segments</span><span class="ip-val">${t.n_segments}</span></div>` +
    `<div class="ip-row"><span class="ip-key">Year range</span><span class="ip-val">${t.year_min}–${t.year_max}</span></div>` +
    `<div class="ip-row"><span class="ip-key">Railway</span><span class="ip-val" style="font-size:0.7rem">${rwyStr}</span></div>`;
}

// ── Sidebar rendering ────────────────────────────────────────────────────────
const namedTracks = TRACKS.filter(t => !t.track_name.startsWith('Minor'));
const minorTracks = TRACKS.filter(t =>  t.track_name.startsWith('Minor'));

function renderList(query) {
  const q    = query.toLowerCase();
  const list = document.getElementById('track-list');
  list.innerHTML = '';

  function matches(t) {
    return !q ||
      t.track_name.toLowerCase().includes(q) ||
      t.railways.toLowerCase().includes(q);
  }

  function addGroup(label, items) {
    const visible = items.filter(matches);
    if (!visible.length) return;
    const hdr = document.createElement('div');
    hdr.className = 'group-hdr';
    hdr.textContent = label;
    list.appendChild(hdr);
    visible.forEach(t => {
      const el   = document.createElement('div');
      el.className = 'track-item' + (t.track_id === activeId ? ' active' : '');
      el.innerHTML =
        `<span class="dot" style="background:${dotColor(t.track_id)}"></span>` +
        `<div>` +
          `<div class="t-name">${t.track_name}</div>` +
          `<div class="t-meta">${t.total_miles.toFixed(0)} mi &middot; ${t.n_segments} segs &middot; ${t.year_min}–${t.year_max}</div>` +
        `</div>`;
      el.addEventListener('click', () => selectTrack(t.track_id));
      list.appendChild(el);
    });
  }

  addGroup('Named Corridors', namedTracks);
  addGroup('Minor Lines (regional)', minorTracks);
}

// ── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => renderList(e.target.value));

// ── Boot ─────────────────────────────────────────────────────────────────────
initBg();
renderList('');
</script>
